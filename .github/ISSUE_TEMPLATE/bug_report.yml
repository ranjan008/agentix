name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.
        **For security vulnerabilities, do NOT use this form — see [SECURITY.md](../../SECURITY.md).**

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure watchdog with ...
        2. Send message to ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text

  - type: input
    id: version
    attributes:
      label: Agentix version / commit SHA
    validations:
      required: true

  - type: dropdown
    id: infra_tier
    attributes:
      label: Infrastructure tier
      options:
        - lite (SQLite)
        - standard (PostgreSQL + Redis)
        - enterprise
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      options:
        - http_webhook
        - telegram
        - slack
        - whatsapp
        - email
        - sqs
        - grpc
        - teams
        - other / not applicable

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.9"
