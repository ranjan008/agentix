name: CI/CD

on:
  push:
    branches: [main, release, production]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Lint & test
  # -------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check agentix/ tests/

      - name: Type check
        run: mypy agentix/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  # -------------------------------------------------------------------------
  # Build & push Docker image
  # -------------------------------------------------------------------------
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Deploy to dev (auto on every push to main)
  # -------------------------------------------------------------------------
  deploy-dev:
    name: Deploy → Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Update Helm values for dev
        run: |
          sed -i "s|tag: .*|tag: \"sha-${GITHUB_SHA::7}\"|" deploy/helm/agentix/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: deploy sha-${GITHUB_SHA::7} to dev" || true
          git push origin main || true

  # -------------------------------------------------------------------------
  # Deploy to staging (auto on push to release branch)
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/release'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Update staging image tag via ArgoCD
        run: |
          echo "Triggering ArgoCD sync for staging with tag sha-${GITHUB_SHA::7}"
          # In practice: argocd app set agentix --helm-set image.tag=sha-${GITHUB_SHA::7}

  # -------------------------------------------------------------------------
  # SOC2 compliance evidence (weekly)
  # -------------------------------------------------------------------------
  soc2-evidence:
    name: SOC2 Evidence Export
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Install & export
        run: |
          pip install -e .
          python -c "
          from agentix.compliance.soc2 import SOC2Exporter
          e = SOC2Exporter('data/agentix.db', {})
          path = e.export('compliance')
          print('SOC2 bundle:', path)
          "
      - name: Upload evidence
        uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence
          path: compliance/
          retention-days: 365
