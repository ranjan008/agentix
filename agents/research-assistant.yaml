apiVersion: "agentix/v1"
kind: "Agent"
metadata:
  name: "research-assistant"
  version: "1.0.0"
  team: "platform"
spec:
  model:
    provider: "anthropic"
    model_id: "claude-sonnet-4-6"
    temperature: 0.3
    max_tokens: 4096

  # Built-in skills — each skill brings its own instructions + tools.
  # No separate tools: list needed; skills are the single source of truth.
  skills:
    - "web-search"   # provides web_search + web_fetch
    - "file-ops"     # provides file_read + file_write + file_list

  # Context compaction — keeps the message history within the token budget
  # to avoid 429 rate limit errors when reading large files across many turns.
  context:
    token_budget: 18000          # trigger compaction at ~18k estimated tokens
    compaction_strategy: truncate
    max_tool_result_chars: 2000  # truncate large file reads in older turns
    keep_recent_turns: 4         # last 4 assistant+user pairs always kept intact

  # Memory configuration (Lite tier: SQLite)
  memory:
    short_term: "sqlite"
    scope: "user"
    max_history_turns: 10
    ttl_sec: 3600

  # Execution limits
  execution:
    timeout_sec: 120
    max_tool_calls: 20

  # Retry on failure
  retry:
    max_attempts: 3
    backoff: "exponential"

  # Channel trigger filters (informational for Phase 1)
  triggers:
    - channel: "http_webhook"
    - channel: "slack"
