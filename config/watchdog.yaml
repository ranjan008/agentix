watchdog:
  # ─── Infrastructure ─────────────────────────────────────────────────────────
  infra_tier: "lite"          # SQLite, single-process, zero external deps
  db_path: "data/agentix.db"
  spawn_mode: "process"
  max_concurrent_agents: 10
  shutdown_timeout_sec: 30        # graceful shutdown wait
  agent_timeout_sec: 600          # max time per agent run (10 min — enough for news+trading)

  # ─── Rate limiting ───────────────────────────────────────────────────────────
  rate_limit:
    max_requests: 60
    window_sec: 60

  # ─── Security & RBAC ────────────────────────────────────────────────────────
  security:
    enforce_rbac: true                  # JWT required on HTTP webhook; RBAC enforced
    jwt_secret_env: "JWT_SECRET"
    pre_check_timeout_ms: 100
    policy_file: "config/policy.yaml"

  # ─── Secrets backend ─────────────────────────────────────────────────────────
  secrets:
    backend: "env"                      # reads from .env / shell env vars

  # ─── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    tick_sec: 5
    schedules_dir: "schedules"

  # ─── Channels ────────────────────────────────────────────────────────────────
  channels:
    # HTTP webhook — also used for local curl tests and ngrok
    - type: "http_webhook"
      port: 8080
      path: "/trigger"
      # Uncomment to require HMAC-signed webhooks:
      # hmac_secret: "${WEBHOOK_HMAC_SECRET}"

    # Telegram Bot API
    # Dev:  no PUBLIC_URL set → auto long-polling (no ngrok needed)
    # Prod: set PUBLIC_URL env var → registers webhook automatically
    # Requires: TELEGRAM_BOT_TOKEN (from @BotFather)
    - type: "telegram"
      default_agent_id: "telegram-agent"
      telegram_webhook_path: "/channels/telegram"
      # public_url: "${PUBLIC_URL}"          # uncomment for webhook mode

# ─── LLM Router ──────────────────────────────────────────────────────────────
llm:
  default_provider: anthropic
  providers:
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-haiku-4-5"         # fastest / cheapest
      # model: "claude-sonnet-4-6"     # balanced: speed + capability
      # model: "claude-opus-4-6"       # most powerful
  routing:
    fallback_chain:
      - anthropic
