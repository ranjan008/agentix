apiVersion: agentix/v1
kind: Connector
metadata:
  name: my-webhook
  description: Generic HTTP webhook to an internal service

spec:
  type: webhook
  config:
    url: https://example.com/api/events
    method: POST                            # Default HTTP method
    verify_ssl: true
    auth_header: "Bearer ${WEBHOOK_SECRET}" # Added as Authorization header
    headers:
      X-Source: agentix
      Content-Type: application/json

  # Actions available to agents:
  #   my-webhook__call  - make an HTTP request
  #                       (method, path, body, query, headers)

---
